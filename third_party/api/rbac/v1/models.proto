syntax = "proto3";

package rbac.v1;

option go_package = "gitlab.calendaria.team/services/rbac/api/rbac/v1;rbac_v1";
option java_multiple_files = true;
option java_package = "rbac.v1";

message Team {
  int64 id = 1;
  int64 ownerId = 2;
  optional int64 parentId = 3;
  repeated int64 parentsIds = 4;
  string name = 5;
  string description = 6;
  string createdAt = 7;
  string updatedAt = 8;
  repeated Team subs = 9;
}

message Group {
  string id = 1;
  string name = 2;
  string appId = 3;
  repeated Permission permissions = 4;
}

message Permission {
  string id = 1;
  string name = 2;
  string description = 3;
  string appId = 4;
  string groupId = 5;
  repeated string fields = 6;
}

message Role {
  int64 id = 1;
  string name = 2;
  string description = 3;
  bool isSystem = 4;
  string createdAt = 5;
  string updatedAt = 6;
  string deletedAt = 7;
}
