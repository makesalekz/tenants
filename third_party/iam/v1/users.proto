syntax = "proto3";

package iam.v1;

import "google/api/annotations.proto";
import "api/iam/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/iam/api/iam/v1;iam_v1";
option java_multiple_files = true;
option java_package = "iam.v1";

service Users {
	// GetOwnProfile  
	// This is self explanotory, returns own profile
	rpc GetOwnProfile (EmptyRequest) returns (UserFullReply) {
		option (google.api.http) = {
			get: "/v1/users/me"
		};
	};
	// UpdateOwnProfile  
	// This is self explanotory, update own profile
	rpc UpdateOwnProfile (UpdateOwnProfileRequest) returns (UserFullReply) {
		option (google.api.http) = {
			post: "/v1/users/me"
			body: "*"
		};
	};
	// DeleteOwnProfile  
	// This is self explanotory, delete own profile
	rpc DeleteOwnProfile (EmptyRequest) returns (EmptyReply) {
		option (google.api.http) = {
			delete: "/v1/users/me"
		};
	};
	// GetUserFull  
	// Returns full information about user  
	// Request: userId of seeking user
	rpc GetUserFull (GetUserRequest) returns (UserFullReply) {
		option (google.api.http) = {
			get: "/v1/users/{userId}/full"
		};
	};
	// in case of search by phone, search.email should not be present  
	// in case of search by email, search.phone should not be present
	rpc GetUserByFilterFull (GetUserByFilterRequest) returns (UserFullReply) {
		option (google.api.http) = {
			post: "/v1/users/user/full"
			body: "*"
		};
	};
	// GetUser  
	// get single user
	rpc GetUser (GetUserRequest) returns (UserReply) {
		option (google.api.http) = {
			get: "/v1/users/{userId}"
		};
	}; 
	// in case of search by phone, search.email should not be present  
	// in case of search by email, search.phone should not be present
	rpc GetUserByFilter (GetUserByFilterRequest) returns (UserReply) {
		option (google.api.http) = {
			post: "/v1/users/user"
			body: "*"
		};
	};
	// search goes by all fileds  
	// t.m if you declare labels,emails,ids this method will return all
	// users that has these fields
	rpc GetUsers (GetUsersRequest) returns (GetUsersReply) {
		option (google.api.http) = {
			post: "/v1/users/list"
			body: "*"
		};
	};
}

message UserFullReply {
	User user = 1;
}

message UpdateOwnProfileRequest {
	string name = 1;
	string bio = 2;
	string avatar = 3;
	string timezone = 4;
}

message GetUserRequest {
	int64 userId = 1;
}

message GetUserByFilterRequest {
	SearchFilter search = 1;
}

message SearchFilter {
	oneof fields{
		string phone = 1;
		string email = 2;
	} 
}

message UserReply {
	UserShort user = 1;
}

message GetUsersRequest {
	repeated int64 ids = 1;
	repeated string phones = 2;
	repeated string emails = 3;
	optional bool withRelation = 4;
}

message GetUsersReply {
	repeated UserShort users = 1;
}

