syntax = "proto3";

package iam.v1;

import "google/api/annotations.proto";
import "api/iam/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/iam/api/iam/v1;iam_v1";
option java_multiple_files = true;
option java_package = "iam.v1";

service Auth {
	// Auth by Phone  
	// request: phone number  
	// returns: id of newly created otp user
	rpc AuthByPhone (AuthByPhoneRequest) returns (AuthByPhoneReply) {
		option (google.api.http) = {
			post: "/v1/auth/phone"
			body: "*"
		};
	};
	// Auth by Code  
	// after you authorized bu phone, you suppose to enter code that you've got here  
	// request: id from AuthByPhone, code from message  
	// returns: bearer token
	rpc AuthByCode (AuthByCodeRequest) returns (TokenReply) {
		option (google.api.http) = {
			post: "/v1/auth/code"
			body: "*"
		};
	};
	rpc RefreshPersonalToken (EmptyRequest) returns (TokenReply) {
		option (google.api.http) = {
			get: "/v1/auth/personal"
		};
	};
	rpc RefreshTenantToken (TenantRequest) returns (TokenReply) {
		option (google.api.http) = {
			get: "/v1/auth/tenant/{tenant_id}"
		};
	};
}

message AuthByPhoneRequest {
	string phone = 1;
}

message AuthByPhoneReply {
	int64 user_id = 1;
}

message AuthByCodeRequest {
	int64 user_id = 1;
	string code = 2;
}

message TenantRequest {
	int64 tenant_id = 1;
}

message TokenReply {
	string access_token = 1;
	string refresh_token = 2;
}
