syntax = "proto3";

package iam.v1;

option go_package = "gitlab.calendaria.team/services/iam/api/iam/v1;iam_v1";
option java_multiple_files = true;
option java_package = "iam.v1";

message User {
	int64 id = 1;
	string name = 2;
	string bio = 3;
	string timezone = 4;
	string createdAt = 5;
	string updatedAt = 6;
	string lastLoginAt = 7;
	bool isActive = 8;
	optional string phone = 9;
	optional string email = 10;
	optional string avatar = 11;
	optional string bioUpdatedAt = 12;

	// field contains contact info
	optional Contact contact = 13;
	// field contains relation info
	optional Relation relation = 14;
	// field contains commonChat info
	optional CommonChat commonChat = 15;
}

message UserShort {
	int64 id = 1;
	string phone = 2;
	string email = 3;
	string name = 4;
	string avatar = 6;
	string lastLoginAt = 7;
}

message Contact {
	string label = 1;
}

message Relation {
	bool isBlocked = 1;
	bool isMuted = 2;
}

message CommonChat {
	int64 chatId = 1;
	string status = 2;
	string role = 3;
	bool isPinned = 4;
	bool isMuted = 5;
	optional string mutedTill = 6;
	optional string archivedAt = 7;
	bool autoSave = 8;
}

message TenantShort {
	int64 id = 1;
	string name = 3;
}