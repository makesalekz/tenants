syntax = "proto3";

package api.iam.v1;

import "google/api/annotations.proto";
import "errors/errors.proto";

option go_package = "iam/api/iam/v1;iam_v1";
option java_multiple_files = true;
option java_package = "api.iam.v1";

service Users {
	rpc GetOwnProfile (EmptyRequest) returns (UserFullReply) {
		option (google.api.http) = {
			get: "/v1/users/me"
		};
	};
	rpc UpdateOwnProfile (UpdateOwnProfileRequest) returns (UserFullReply) {
		option (google.api.http) = {
			post: "/v1/users/me"
			body: "*"
		};
	};
	rpc DeleteOwnProfile (EmptyRequest) returns (EmptyReply) {
		option (google.api.http) = {
			delete: "/v1/users/me"
		};
	};
	rpc GetUserFull (GetUserRequest) returns (UserFullReply) {
		option (google.api.http) = {
			get: "/v1/users/{userId}/full"
		};
	};
	rpc GetUser (GetUserRequest) returns (UserReply) {
		option (google.api.http) = {
			get: "/v1/users/{userId}"
		};
	};
	rpc GetUsers (GetUsersRequest) returns (GetUsersReply) {
		option (google.api.http) = {
			post: "/v1/users/list"
			body: "*"
		};
	};
}

message EmptyRequest {}
message EmptyReply {}

message UserFullReply {
	User user = 1;
}

message UpdateOwnProfileRequest {
	string name = 1;
	string bio = 2;
	string avatar = 3;
	string timezone = 4;
}

message GetUserRequest {
	int64 userId = 1;
}

message UserReply {
	UserShort user = 1;
}

message GetUsersRequest {
	repeated int64 ids = 1;
}

message GetUsersReply {
	repeated UserShort users = 1;
}

message User {
	int64 id = 1;
	string name = 2;
	string bio = 3;
	string timezone = 4;
	string createdAt = 5;
	string updatedAt = 6;
	string lastLoginAt = 7;
	bool isActive = 8;
	optional string phone = 9;
	optional string email = 10;
	optional string avatar = 11;
	optional string bioUpdatedAt = 12;
}

message UserShort {
	int64 id = 1;
	string phone = 2;
	string email = 3;
	string name = 4;
	string avatar = 6;
	string lastLoginAt = 7;
}

enum ErrorReason {
  // Set default error code.
  option (errors.default_code) = 500;

  // Set the error code separately for an enumeration.
  INTERNAL = 0;
  GRPC_CONNECTION = 1;
  SERVICE_FAILED = 2;
  DATABASE_QUERY = 3;
  
  UNAUTHORIZED = 10 [(errors.code) = 401];
  INVALID_PHONE_NUMBER = 11 [(errors.code) = 400];
  INVALID_TOKEN = 12 [(errors.code) = 401];
  INVALID_CODE = 13 [(errors.code) = 401];

  USER_NOT_FOUND = 20 [(errors.code) = 404];
  INVALID_REQUEST = 21 [(errors.code) = 400];
}