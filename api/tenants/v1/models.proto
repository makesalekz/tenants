syntax = "proto3";

package tenants.v1;

option go_package = "gitlab.calendaria.team/services/tenants/api/tenants/v1;tenants_v1";
option java_multiple_files = true;
option java_package = "tenants.v1";

message MemberShort {
	int64 id = 1;
	int64 userId = 2;
}

message Tenant {
	int64 id = 1;
	int64 ownerId = 2;
	string name = 3;
	string createdAt = 4;
}