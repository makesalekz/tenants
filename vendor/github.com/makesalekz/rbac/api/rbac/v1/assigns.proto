syntax = "proto3";

package rbac.v1;

import "api/utils/v1/models.proto";
import "api/rbac/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/rbac/api/rbac/v1;rbac_v1";
option java_multiple_files = true;
option java_package = "rbac.v1";

service Assigns {
  rpc AssignRole(AssignRoleRequest) returns (utils.v1.EmptyReply);
  rpc AssignRoles(AssignRolesRequest) returns (utils.v1.EmptyReply);
  rpc UnassignRole(AssignRequest) returns (utils.v1.EmptyReply);
  rpc ListAssigns(ListAssignsRequest) returns (ListAssignsReply);
  rpc GetAssign(AssignRequest) returns (AssignedRole);
}

message AssignRoleRequest {
  string identityId = 1;
  int64 roleId = 2;
  int64 teamId = 3;
  Resource resource = 4;
}

message AssignRolesRequest {
  repeated AssignRoleRequest assigns = 1;
}

message AssignRequest {
  int64 assignId = 1;
}

message ListAssignsRequest {
  repeated string identityIds = 3;
  repeated string resourceTypes = 6;
  repeated Resource resources = 5;
}

message ListAssignsReply {
  repeated AssignedRole roles = 1;
}

message AssignedRole {
  int64 assignId = 4;
  Role role = 1;
  optional string identityId = 2;
  optional Resource resource = 5;
}
