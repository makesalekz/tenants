syntax = "proto3";

package iam.v1;

import "api/utils/v1/models.proto";

option go_package = "github.com/makesalekz/iam/api/iam/v1;iam_v1";
option java_multiple_files = true;
option java_package = "iam.v1";

service Privacy {
  // Get privacy settings of the current user
  // Returns: the privacy settings of the current user
  rpc GetPrivacy(utils.v1.EmptyRequest) returns (PrivacyReply);

  // Get privacy settings of the users' list
  // Request: the list of users' ids
  // Returns: the privacy settings of the users' list
  rpc GetUsersPrivacies(UsersPrivaciesRequest) returns (UsersPrivaciesReply);

  // Update privacy settings of the current user
  // Request: new privacy settings
  // Returns: the updated privacy settings
  rpc UpdatePrivacy(PrivacyRequest) returns (PrivacyReply);
}

/* PrivacyRequest is a request to update privacy settings */
message PrivacyRequest {
  map<string, string> settings = 1;
}

/* PrivacyReply is a reply with privacy settings */
message PrivacyReply {
  map<string, string> settings = 1;
}

/* UsersPrivaciesRequest is a request to get privacy settings of the users' list
 */
message UsersPrivaciesRequest {
  repeated int64 ids = 1;
}

/* UsersPrivaciesReply is a reply with privacy settings of the users' list */
message UsersPrivaciesReply {
  repeated UserPrivacies users = 1;
}

/* UserPrivacies is a privacy settings of the user */
message UserPrivacies {
  int64 id = 1;
  map<string, string> privacies = 2;
}